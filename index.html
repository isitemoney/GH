<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daring Money | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #050b1a; color: #e2e8f0; }
        .hidden { display: none !important; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s ease; }
        .num-font { font-family: 'JetBrains Mono', monospace; }
        input, select { background: rgba(30, 41, 59, 0.5) !important; border: 1px solid rgba(71, 85, 105, 0.5) !important; color: white !important; }
    </style>
</head>
<body>

    <div id="copy-toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-500 z-[1000]">
        <span class="text-lg">🔗</span>
        <span class="text-sm font-bold italic">تم نسخ رابطك التسويقي بنجاح!</span>
    </div>

    <nav id="nav" class="hidden glass-card sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex flex-col text-right">
            <h1 class="text-xl font-black text-white italic">DARING <span class="text-blue-500">MONEY</span></h1>
            <p id="user-welcome" class="text-[10px] text-emerald-400 font-bold italic"></p>
        </div>
        <button onclick="logout()" class="text-xs bg-red-500/10 text-red-500 px-4 py-2 rounded-xl border border-red-500/20 font-bold">خروج</button>
    </nav>

    <div id="dashboard-section" class="hidden max-w-4xl mx-auto p-4 space-y-6">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="glass-card p-4 rounded-2xl text-center"><p class="text-blue-400 text-[10px] font-black mb-1">أرباح اليوم</p><h3 id="stat-today" class="num-font text-xl font-bold">$0.00</h3></div>
            <div class="glass-card p-4 rounded-2xl text-center"><p class="text-slate-400 text-[10px] font-black mb-1">إجمالي الأرباح</p><h3 id="stat-total" class="num-font text-xl font-bold">$0.00</h3></div>
            <div class="glass-card p-4 rounded-2xl text-center border-b-emerald-500/40"><p class="text-emerald-400 text-[10px] font-black mb-1 underline">القابل للسحب</p><h3 id="stat-withdrawable" class="num-font text-xl font-bold text-emerald-400">$0.00</h3></div>
            <div class="glass-card p-4 rounded-2xl text-center"><p class="text-purple-400 text-[10px] font-black mb-1">النقرات</p><h3 id="stat-clicks" class="num-font text-xl font-bold text-white">0</h3></div>
        </div>

        <div class="glass-card p-6 rounded-[2rem] border-r-4 border-blue-500">
            <h4 class="font-bold text-xs text-slate-300 mb-3 italic">🔗 رابط التسويق الخاص بك</h4>
            <div class="flex bg-slate-950 rounded-2xl overflow-hidden border border-slate-800 p-1">
                <input type="text" id="ref-link" readonly class="bg-transparent px-3 flex-1 text-[10px] outline-none text-blue-300 font-mono italic">
                <button onclick="copyRef()" class="btn-primary px-6 py-2 rounded-xl text-xs font-black text-white">نسخ الرابط</button>
            </div>
        </div>

        <div class="glass-card p-6 rounded-[2rem] border-r-4 border-emerald-500">
            <h4 class="font-bold text-sm text-emerald-400 mb-6">💰 طلب سحب الأرباح</h4>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="w-method" class="w-full p-4 rounded-2xl text-xs font-bold outline-none">
                        <option value="ZainCash">زين كاش</option>
                        <option value="USDT">USDT (TRC20)</option>
                    </select>
                    <input type="text" id="w-account" placeholder="رقم الهاتف أو المحفظة" class="w-full p-4 rounded-2xl text-xs text-right font-bold outline-none">
                </div>
                <button onclick="confirmWithdraw()" class="btn-primary w-full py-4 rounded-2xl font-black text-white">تأكيد طلب السحب</button>
            </div>
        </div>

        <div class="glass-card p-6 rounded-[2rem]">
            <h4 class="text-[10px] font-black mb-4 text-slate-500 uppercase tracking-widest italic">📋 سجل السحوبات</h4>
            <div id="user-withdraw-history" class="space-y-3"></div>
        </div>

        <div id="admin-area" class="hidden pt-10 border-t border-slate-800 space-y-6">
            <h2 class="text-xl font-black text-red-500 px-2 italic">🛡️ لوحة التحكم (أدمن)</h2>
            
            <div class="space-y-4">
                <h3 class="text-sm font-bold text-slate-400 italic">⏳ طلبات السحب المعلقة</h3>
                <div id="admin-withdraw-list" class="space-y-3"></div>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-bold text-slate-400 italic">👥 إدارة المروجين والروابط</h3>
                <div id="admin-users-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        // إعدادات الفايربيس (تأكدي من صحتها)
        const firebaseConfig = {
            apiKey: "AIzaSyCnkJf-6sAeRJpm34yXLmklLwSxM-GJvUc",
            authDomain: "my-dash-c78e3.firebaseapp.com",
            databaseURL: "https://my-dash-c78e3-default-rtdb.firebaseio.com",
            projectId: "my-dash-c78e3",
            storageBucket: "my-dash-c78e3.firebasestorage.app",
            messagingSenderId: "137154835768",
            appId: "1:137154835768:web:7f396782de1300f9bdfdcd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const ADMIN_EMAILS = ["xxetali46@gmail.com", "xxetali47@gmail.com"];

        // دالة نسخ الرابط مع الإشعار
        function copyRef() {
            const el = document.getElementById('ref-link');
            el.select();
            document.execCommand('copy');
            const toast = document.getElementById('copy-toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // دالة السحب والرسالة
        function confirmWithdraw() {
            const amount = parseFloat(document.getElementById('w-amount')?.value || 0);
            // ... (بقية منطق السحب)
            alert("✅ تم إرسال طلب السحب بنجاح!\nالرجاء الانتظار لحين تأكيد الدفع، تستغرق العملية من 24 إلى 72 ساعة.");
        }

        // --- لوحة الأدمن الاحترافية ---
        function loadAdminPanel() {
            // 1. عرض طلبات السحب وتغيير حالتها
            db.ref('withdrawals').on('value', snap => {
                const list = document.getElementById('admin-withdraw-list');
                const data = snap.val(); list.innerHTML = "";
                if (!data) return;
                Object.keys(data).forEach(id => {
                    const w = data[id];
                    if (w.status === 'paid') return;
                    list.innerHTML += `<div class="bg-slate-900 p-4 rounded-xl border-r-4 border-amber-500 flex justify-between items-center">
                        <div><p class="num-font text-white font-bold">$${w.amount}</p><p class="text-[9px] text-slate-500">${w.method}: ${w.account}</p></div>
                        <button onclick="updateWithdrawStatus('${id}')" class="bg-emerald-600 px-3 py-1 rounded text-[10px] font-bold">تأكيد الدفع ✅</button>
                    </div>`;
                });
            });

            // 2. عرض المستخدمين وتغيير روابطهم
            db.ref('users').on('value', snap => {
                const list = document.getElementById('admin-users-list');
                const users = snap.val(); list.innerHTML = "";
                if (!users) return;
                Object.keys(users).forEach(uid => {
                    const u = users[uid];
                    list.innerHTML += `<div class="glass-card p-4 rounded-xl space-y-2">
                        <p class="text-xs font-bold text-blue-400">${u.username}</p>
                        <input type="text" id="link-${uid}" value="${u.marketingLink}" class="w-full p-2 rounded text-[9px] outline-none">
                        <button onclick="updateUserLink('${uid}')" class="w-full bg-blue-600 py-1 rounded text-[10px] font-bold">تحديث الرابط 🔄</button>
                    </div>`;
                });
            });
        }

        function updateWithdrawStatus(id) {
            db.ref('withdrawals/' + id).update({ status: 'paid' })
              .then(() => alert("تم تحديث الحالة إلى (تم الدفع) بنجاح!"));
        }

        function updateUserLink(uid) {
            const newLink = document.getElementById('link-' + uid).value;
            db.ref('users/' + uid).update({ marketingLink: newLink })
              .then(() => alert("تم تحديث الرابط الخاص بالمروج بنجاح!"));
        }

        // ... (بقية دوال initApp و loadData)
    </script>
</body>
</html>
