<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eran Money | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap'); 
        body { font-family: 'Tajawal', sans-serif; background-color: #020617; } 
        .hidden { display: none !important; } 
        .stat-number { font-family: sans-serif !important; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-10 text-right">

    <div id="redirect-screen" class="hidden flex flex-col items-center justify-center min-h-screen p-6 text-center text-blue-400 bg-slate-950 fixed inset-0 z-[9999]">
        <div class="animate-spin rounded-full border-4 border-t-blue-500 border-slate-800 h-14 w-14 mb-6"></div>
        <h2 class="text-xl font-medium tracking-wide text-slate-200">جاري فحص الأمان...</h2>
    </div>

    <nav id="nav" class="hidden glass-nav p-4 flex justify-between items-center px-6 sticky top-0 z-50">
        <div class="flex flex-col">
            <span class="text-xl font-black text-blue-500 tracking-tighter italic">ERAN MONEY</span>
            <div class="flex items-center gap-1">
                <span class="text-[10px] text-slate-500 font-bold">أهلاً بك،</span>
                <span id="user-welcome" class="text-[10px] text-emerald-400 font-black italic underline">...</span>
            </div>
        </div>
        <button onclick="logout()" class="bg-red-500/10 text-red-500 px-3 py-1 rounded-lg border border-red-500/20 text-[10px] font-bold">خروج</button>
    </nav>

    <div id="auth-section" class="hidden flex items-center justify-center min-h-screen p-4">
        <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-800 text-center">
            <h1 id="auth-title" class="text-3xl font-black text-white mb-8 italic">ERAN <span class="text-blue-500">MONEY</span></h1>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="الاسم الكامل" class="hidden w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:border-blue-500 transition text-sm text-right">
                <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:border-blue-500 transition text-sm text-left">
                <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:border-blue-500 transition text-sm text-left">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition active:scale-95 shadow-lg">تسجيل الدخول</button>
                <button onclick="toggleAuthMode()" id="auth-switch" class="w-full text-slate-500 text-xs font-bold underline">ليس لديك حساب؟ سجل الآن</button>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="hidden p-4 max-w-6xl mx-auto space-y-6 mt-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800"><p class="text-slate-400 text-[11px] mb-1 font-bold">إجمالي الأرباح</p><h3 id="stat-total" class="stat-number text-2xl font-bold">$0.00</h3></div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 border-b-blue-500/40"><p class="text-blue-400 text-[11px] mb-1 font-bold">أرباح اليوم</p><h3 id="stat-today" class="stat-number text-2xl font-bold text-blue-400">$0.00</h3></div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 border-b-emerald-500/40"><p class="text-emerald-400 text-[11px] mb-1 font-bold underline">قابل للسحب</p><h3 id="stat-withdrawable" class="stat-number text-2xl font-bold text-emerald-400">$0.00</h3></div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800"><p class="text-slate-400 text-[11px] mb-1 font-bold">النقرات</p><h3 id="stat-clicks" class="stat-number text-2xl font-bold text-purple-400">0</h3></div>
        </div>

        <div class="bg-slate-900 border border-slate-800 p-6 rounded-[2rem]">
            <h4 class="font-bold mb-3 text-[10px] text-slate-500 uppercase tracking-widest border-r-2 border-blue-500 pr-2">🔗 رابط التسويق الخاص بك</h4>
            <div class="flex bg-slate-950 rounded-2xl overflow-hidden border border-slate-800 p-1">
                <input type="text" id="ref-link" readonly class="bg-transparent p-3 flex-1 text-[10px] outline-none text-blue-300 text-left font-mono italic">
                <button onclick="copyRef()" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold transition">نسخ</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnkJf-6sAeRJpm34yXLmklLwSxM-GJvUc",
            authDomain: "my-dash-c78e3.firebaseapp.com",
            databaseURL: "https://my-dash-c78e3-default-rtdb.firebaseio.com",
            projectId: "my-dash-c78e3",
            storageBucket: "my-dash-c78e3.firebasestorage.app",
            messagingSenderId: "137154835768",
            appId: "1:137154835768:web:7f396782de1300f9bdfdcd"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const DEFAULT_MARKETING_LINK = "https://hp.funroom.store/a/8nw6emt2";

        let isLoginMode = true;

        // تبديل بين الدخول والتسجيل
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('username').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-title').innerHTML = isLoginMode ? "ERAN <span class='text-blue-500'>MONEY</span>" : "عضو <span class='text-blue-500'>جديد</span>";
            document.getElementById('auth-btn').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء الحساب";
            document.getElementById('auth-switch').innerText = isLoginMode ? "ليس لديك حساب؟ سجل الآن" : "لديك حساب بالفعل؟ ادخل هنا";
        }

        // معالجة الدخول والتسجيل
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const name = document.getElementById('username').value;

            if (!email || !pass) return alert("يرجى إدخال البيانات");

            try {
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    if (!name) return alert("يرجى كتابة اسمك");
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    // إنشاء بيانات المروج الجديد في قاعدة البيانات
                    await db.ref('users/' + res.user.uid).set({
                        username: name,
                        email: email,
                        totalBalance: 0,
                        todayBalance: 0,
                        withdrawableBalance: 0,
                        clicks: 0,
                        marketingLink: DEFAULT_MARKETING_LINK,
                        lastResetDate: Date.now()
                    });
                }
            } catch (e) {
                alert("خطأ: " + e.message);
            }
        }

        function checkRoute() {
            const params = new URLSearchParams(window.location.search);
            const promoterId = params.get('id');
            if (promoterId) { 
                document.getElementById('redirect-screen').classList.remove('hidden'); 
                handleVisitor(promoterId); 
            } else { 
                initDashboard(); 
            }
        }

        async function handleVisitor(id) {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const vIp = ipData.ip.replace(/\./g, '_'); 
                const ipRef = db.ref('ip_logs/' + id + '/' + vIp);
                const userRef = db.ref('users/' + id);
                const ipSnap = await ipRef.once('value');
                const now = Date.now();
                
                if (ipSnap.exists() && (now - ipSnap.val() < 86400000)) { 
                    finalizeRedirect(userRef); 
                } else {
                    await ipRef.set(now);
                    await userRef.transaction(d => {
                        if (d) {
                            d.clicks = (d.clicks || 0) + 1;
                            d.todayBalance = Number(((d.todayBalance || 0) + 0.02).toFixed(2));
                            d.totalBalance = Number(((d.totalBalance || 0) + 0.02).toFixed(2));
                        }
                        return d;
                    });
                    finalizeRedirect(userRef);
                }
            } catch (e) { window.location.href = DEFAULT_MARKETING_LINK; }
        }

        async function finalizeRedirect(ref) {
            const snap = await ref.once('value');
            const link = (snap.val() && snap.val().marketingLink) ? snap.val().marketingLink : DEFAULT_MARKETING_LINK;
            setTimeout(() => { window.location.href = link; }, 1000);
        }

        function initDashboard() {
            auth.onAuthStateChanged(user => {
                if (user) {
                    showUI('dashboard-section');
                    loadUserData(user);
                } else { showUI('auth-section'); }
            });
        }

        function loadUserData(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const d = snap.val(); if(!d) return;
                document.getElementById('stat-total').innerText = `$${(d.totalBalance || 0).toFixed(2)}`;
                document.getElementById('stat-today').innerText = `$${(d.todayBalance || 0).toFixed(2)}`;
                document.getElementById('stat-withdrawable').innerText = `$${(d.withdrawableBalance || 0).toFixed(2)}`;
                document.getElementById('stat-clicks').innerText = d.clicks || 0;
                document.getElementById('user-welcome').innerText = d.username || 'مروجنا';
                document.getElementById('ref-link').value = window.location.origin + window.location.pathname + "?id=" + user.uid;
            });
        }

        function showUI(id) {
            document.querySelectorAll('#auth-section, #dashboard-section, #nav').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'dashboard-section') document.getElementById('nav').classList.remove('hidden');
        }

        function copyRef() { const el = document.getElementById('ref-link'); el.select(); document.execCommand('copy'); alert("✅ تم النسخ!"); }
        function logout() { auth.signOut(); }

        checkRoute();
    </script>
</body>
</html>
